name: Build and Deploy Presentations

on:
  push:
    branches:
      - main  # Change this to master if your default branch is master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Build Marp slides
        run: |
          mkdir -p _site
          npx @marp-team/marp-cli@latest -I presentations/ --html --allow-local-files -o _site/
          
      - name: Create Index page
        run: |
          cat <<EOF > _site/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>IRA QA Mentoring</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2rem; max-width: 800px; margin: auto; background-color: #f6f8fa;}
              .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
              h1 { color: #24292f; border-bottom: 2px solid #eaecef; padding-bottom: 10px;}
              ul { list-style-type: none; padding-left: 0; }
              li { margin-bottom: 15px; }
              a { text-decoration: none; color: #0969da; font-size: 1.2rem; font-weight: 500;}
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>🚀 IRA QA Mentoring Presentations</h1>
              <p>Click on any phase below to open the presentation slides:</p>
              <ul>
                <li><a href="phase-0-setup.html">Phase 0: Setup and Baseline</a></li>
                <li><a href="phase-1-python.html">Phase 1: Python for QA</a></li>
                <li><a href="phase-2-pytest.html">Phase 2: pytest Fundamentals</a></li>
                <li><a href="phase-3-playwright.html">Phase 3: Web Automation with Playwright</a></li>
                <li><a href="phase-4-api.html">Phase 4: API Testing</a></li>
                <li><a href="phase-5-ai-workflow.html">Phase 5: AI-Assisted QA Workflow</a></li>
                <li><a href="phase-6-portfolio.html">Phase 6: Portfolio Project</a></li>
                <li><a href="phase-7-job-readiness.html">Phase 7: Job Readiness</a></li>
              </ul>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
